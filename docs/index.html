<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
	<meta charset="utf-8">
	<base target="_blank">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Cache-Control" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="referrer" content="no-referrer" />
	<meta http-equiv="refresh" content="300">
	<link rel="stylesheet" type="text/css" href="./lib/master.css?t=0" />
	<script src="./lib/master.js"></script>
	<title>n138-kz.github.io</title>
	<style>
		[src*="valuecommerce.com"]+a img {
			width: 300px;
		}
	</style>
	<script>
		async function get_API_Item(params={}) {
			if (params.url===undefined) { return; }

			let request;
			try {
				request = await fetch(params.url);
				let response = await request.json();
				return {
					request: request,
					response: response,
				};
			} catch (error) {
				return {
					request: request,
					error: error,
				};
			}
		}
		async function getListOfSocialPublicAccounts() {
			const item = document.getElementById('SocialPublicAccounts');
			const request = await get_API_Item({ url: './lib/sections.json', });
			console.debug(await request);
			if (! Array.isArray(await request.response)) { item.remove(); return; }
			
			item_header=document.createElement('h2');
			item_header.innerText='Navigation';
			item.appendChild(item_header);
			
			response = await request.response;
			console.debug(await response);
			
			let stracture=[];
			stracture[0]=document.createElement('div');
			stracture[0].style.marginLeft='32px';
			response.map(e0=>{
				stracture[1]=document.createElement('li');
				stracture[1].style.listStyleType='none';
				stracture[2]=document.createElement('a');
				stracture[2].href=`${e0.url}`;
				stracture[2].target=`_blank`;
				
				stracture[3]=document.createElement('img');
				stracture[3].src=`${e0.favicon}`;
				stracture[3].style.height=`1.5em`;
				stracture[3].style.display=`inline-block`;
				stracture[2].appendChild(stracture[3]);
				
				stracture[3]=document.createTextNode(`${e0.name}`);
				stracture[2].appendChild(stracture[3]);
				
				stracture[1].appendChild(stracture[2]);
				
				stracture[0].appendChild(stracture[1]);
			});
			item.appendChild(stracture[0]);
			item.style.float='left';
			item.style.marginRight='32px';
		}
		async function getListOfGithubPublicRepos() {
			const item = document.getElementById('GithubPublicRepos');
			const request = await get_API_Item({ url: 'https://api.github.com/users/n138-kz/repos?sort=name&per_page=300', });
			console.debug(await request);
			if (! Array.isArray(await request.response)) { item.remove(); return; }

			item_header=document.createElement('h2');
			item_header.innerText='GitHub Public Repos';
			item.appendChild(item_header);

			response = await request.response;
			console.debug(await response);

			let stracture=[];
			stracture.push(document.createElement('div'));
			stracture[0].style.marginLeft='32px';
			stracture[0].style.height='500px';
			stracture[0].style.maxWidth='1000px';
			stracture[0].style.overflowY='scroll';
			response.map(e0=>{
				stracture.push(document.createElement('dl'));
				stracture[stracture.length-1].style.marginBlockStart='0';
				stracture[stracture.length-1].style.marginBlockEnd='0';

				stracture.push(document.createElement('dt'));
				stracture[stracture.length-1].innerHTML='';
				stracture[stracture.length-1].innerHTML+=`<a href="${e0['html_url']}">${e0['name']}</a>`;
				stracture[stracture.length-1].innerHTML+=(e0['homepage']===null||e0['homepage']===undefined||e0['homepage']==false)?'':`<a href="${e0['homepage']}"><img src="./lib/14827.png" style="height: 1.5em;"></a>`;
				stracture[stracture.length-1].style=whiteSpace='no-wrap';
				stracture[stracture.length-2].appendChild(stracture[stracture.length-1]);
				stracture.pop();

				stracture.push(document.createElement('dd'));
				stracture[stracture.length-1].innerText=(e0['description']===null||e0['description']===undefined||e0['description']==false)?'':`${e0['description']}`;
				stracture[stracture.length-1].style=whiteSpace='no-wrap';
				stracture[stracture.length-2].appendChild(stracture[stracture.length-1]);
				stracture.pop();

				stracture[stracture.length-2].appendChild(stracture[stracture.length-1]);
			});
			item.appendChild(stracture[0]);
			item.style.float='left';
			item.style.marginRight='32px';
		}
		async function BuildDevOpsFields() {
			const item = document.getElementById('DevOpsFields');

			item_header=document.createElement('h2');
			item_header.innerText='Details';
			item.appendChild(item_header);
			
			let stracture=[];
			stracture.push(document.createElement('div'));
			stracture[0].style.marginLeft='32px';
			{
				stracture[1]=document.createElement('table');
				stracture[2]=document.createElement('tbody');

				{
					stracture[3]=document.createElement('tr');
					stracture[4]=document.createElement('th');
					stracture[4].innerText=`Screen size`;
					stracture[3].appendChild(stracture[4]);
					stracture[4]=document.createElement('td');
					stracture[4].innerText=`%{width}x%{height}`;
					stracture[4].dataset.id=`debug.detail.screensize`;
					stracture[3].appendChild(stracture[4]);
	
					stracture[2].appendChild(stracture[3]);
				}

				{
					stracture[3]=document.createElement('tr');
					stracture[4]=document.createElement('th');
					stracture[4].innerText=`Network delay`;
					stracture[3].appendChild(stracture[4]);
					stracture[4]=document.createElement('td');
					stracture[4].innerText=`> 999 ms`;
					stracture[4].dataset.id=`debug.detail.networkdelay`;
					stracture[3].appendChild(stracture[4]);
	
					stracture[2].appendChild(stracture[3]);
				}

				{
					stracture[3]=document.createElement('tr');
					stracture[4]=document.createElement('th');
					stracture[4].innerText=`Your IP Addr`;
					stracture[3].appendChild(stracture[4]);
					stracture[4]=document.createElement('td');
					stracture[4].innerText=`FD00::1`;
					stracture[4].dataset.id=`debug.detail.clientaddr`;
					stracture[3].appendChild(stracture[4]);
	
					stracture[2].appendChild(stracture[3]);
				}

				{
					stracture[3]=document.createElement('tr');
					stracture[4]=document.createElement('th');
					stracture[4].innerHTML=`GitHub API<br>Usage amount`;
					stracture[3].appendChild(stracture[4]);
					stracture[4]=document.createElement('td');
					stracture[4].innerText=`(MM/DD, HH:MM:SS)`;
					stracture[4].dataset.id=`debug.detail.githubapiamount`;
					stracture[3].appendChild(stracture[4]);
	
					stracture[2].appendChild(stracture[3]);
				}

				{
					stracture[3]=document.createElement('tr');
					stracture[4]=document.createElement('th');
					stracture[4].innerText=`Local Time`;
					stracture[3].appendChild(stracture[4]);
					stracture[4]=document.createElement('td');
					stracture[4].innerText=`Y-M-D H:m:S.000`;
					stracture[4].dataset.id=`debug.detail.localtime`;
					stracture[3].appendChild(stracture[4]);
	
					stracture[2].appendChild(stracture[3]);
				}

				stracture[1].appendChild(stracture[2]);

				stracture[0].appendChild(stracture[1]);
			}
			item.appendChild(stracture[0]);
			item.style.float='left';
			item.style.marginRight='32px';
		}
		setInterval(async ()=>{
			try {
				if (true) {
					document.querySelector(`[data-id="debug.detail.screensize"]`).innerText=`${document.querySelector('html').clientWidth}x${document.querySelector('html').clientHeight}`;
				}
			} catch (error) {}
			try {
				if (true) {
					const ping_rtt_0=Date.now()/10**3;
					const ping_rtt_xhr=await fetch(`${location.origin}`, {
						method: 'HEAD',
						redirect: 'follow',
						referrerPolicy: 'no-referrer',
						credentials: 'include',
					});
					if ( ! await ping_rtt_xhr.ok ) {
						throw {
							title: `HTTP Error: ${ping_rtt_xhr.url}`,
								url: ping_rtt_xhr.url,
							ok: await ping_rtt_xhr.ok,
							message: await ping_rtt_xhr.statusText,
							code: await ping_rtt_xhr.status,
							redirected: await ping_rtt_xhr.redirected
						}
					}
					const ping_rtt_1=Date.now()/10**3;
					const ping_rtt={
						time: (ping_rtt_1-ping_rtt_0)*10**3,
						unit: 'ms',
						status: '',
					};
					document.querySelector(`[data-id="debug.detail.networkdelay"]`).innerText=`${Math.round(ping_rtt.time)}${ping_rtt.unit}`;
				}
			} catch (error) {}
			try {
				if (false) {
					const request = await get_API_Item({ url: 'https://ipinfo.io/json', });
					console.debug(await request);

					response = await request.response;
					console.debug(await response);

					document.querySelector(`[data-id="debug.detail.clientaddr"]`).innerHTML=`<a href="https://ipinfo.io/${response.ip}/json">${response.hostname}</a>`;
				}
			} catch (error) {}
			try {
				if (true) {
					const request = await get_API_Item({ url: 'https://api.github.com/rate_limit', });
					console.debug(await request);

					response = await request.response;
					console.debug(await response);

					document.querySelector(`[data-id="debug.detail.githubapiamount"]`).innerHTML=`Remaining: ${response.rate.remaining}/${response.rate.limit} (Use: ${response.rate.used})<br>Reset: ${new Date(response.rate.reset*10**3).toLocaleString()}`;
				}
			} catch (error) {}
			try {
				if (true) {
					const now=new Date();
					document.querySelector(`[data-id="debug.detail.localtime"]`).innerText=`${now.toLocaleString()}.${now.getMilliseconds()}`;
				}
			} catch (error) {}
		},500);
		window.addEventListener('DOMContentLoaded', async (e)=>{
			try { await getListOfGithubPublicRepos(); } catch (error) {}
			try { await getListOfSocialPublicAccounts(); } catch (error) {}
			try { await BuildDevOpsFields(); } catch (error) {}
		});
	</script>
</head>
<body>
	<div id="SocialPublicAccounts"></div>
	<div id="GithubPublicRepos"></div>
	<div id="DevOpsFields"></div>
</body>
</html>

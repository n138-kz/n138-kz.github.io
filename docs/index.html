<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
	<meta charset="utf-8">
	<base target="_blank">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Cache-Control" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="referrer" content="no-referrer" />
	<meta http-equiv="refresh" content="300">
	<link rel="stylesheet" type="text/css" href="./lib/master.css?t=0" />
	<script src="./lib/master.js"></script>
	<title>n138-kz.github.io</title>
	<style>
		[src*="valuecommerce.com"]+a img {
			width: 300px;
		}
	</style>
	<script>
		async function get_API_Item(params={}) {
			if (params.url===undefined) { return; }

			let request;
			try {
				request = await fetch(params.url);
				let response = await request.json();
				return {
					request: request,
					response: response,
				};
			} catch (error) {
				return {
					request: request,
					error: error,
				};
			}
		}
		async function getListOfGithubPublicRepos () {
			const request = await get_API_Item({ url: 'https://api.github.com/users/n138-kz/repos?sort=name&per_page=300', });
			console.log(await request);

			gh_repos_list = await request.response;
			console.log(await gh_repos_list);

			gh_repos_list.map(e0=>{
				let lists=[];
				lists.push(document.createElement('dl')); // 0
				lists[lists.length-1].style.marginBlockStart='0';
				lists[lists.length-1].style.marginBlockEnd='0';

				lists.push(document.createElement('dt')); // 1
				lists[lists.length-1].innerHTML='';
				lists[lists.length-1].innerHTML+=`<a href="${e0['html_url']}">${e0['name']}</a>`;
				lists[lists.length-1].innerHTML+=(e0['homepage']===null||e0['homepage']===undefined||e0['homepage']==false)?'':`<a href="${e0['homepage']}"><img src="./lib/14827.png" style="height: 16px;"></a>`;
				lists[lists.length-1].style=whiteSpace='no-wrap';
				lists[lists.length-2].appendChild(lists[lists.length-1]); // 1 --> 0
				lists.pop(); // 0

				lists.push(document.createElement('dd')); // 1
				lists[lists.length-1].innerText=(e0['description']===null||e0['description']===undefined||e0['description']==false)?'':`${e0['description']}`;
				lists[lists.length-1].style=whiteSpace='no-wrap';
				lists[lists.length-2].appendChild(lists[lists.length-1]); // 1 --> 0
				lists.pop(); // 0

				console.log(lists[0], e0);
				document.getElementById('GithubPublicRepos').appendChild(lists[0]);
			});

		}
		window.addEventListener('DOMContentLoaded', async (e)=>{
			await getListOfGithubPublicRepos()
		});
	</script>
</head>
<body>
	<div id="GithubPublicRepos">
		<h2>GitHub Public Repos</h2>
	</div>
</body>
</html>
